<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | Pro Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 450px; }
        .ai-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .ai-input:focus { border-color: #3b82f6; outline: none; background: rgba(59, 130, 246, 0.05); }
        .glow-button { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .glow-button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-6">

    <div class="glass-panel p-8 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Vidal-AI</h1>
        <p class="text-gray-500 text-[10px] tracking-[0.2em] mb-8 uppercase font-bold">Connected to Supabase Cloud</p>

        <div id="dropZone" class="relative group cursor-pointer mb-6">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div id="previewContainer" class="hidden overflow-hidden rounded-3xl border-2 border-blue-500/40 shadow-lg">
                <img id="imagePreview" class="w-full h-52 object-cover">
            </div>
            <div id="uploadPlaceholder" class="border-2 border-dashed border-gray-800 rounded-3xl py-12 hover:border-blue-500/50 transition-colors">
                <div class="text-4xl mb-3">🚀</div>
                <p class="font-bold text-sm">Upload Product Image</p>
            </div>
        </div>

        <div class="text-left mb-6">
            <label class="block text-blue-400 text-[10px] font-black mb-2 uppercase tracking-widest ml-1">Motion Prompt</label>
            <textarea 
                id="promptInput" 
                rows="3" 
                placeholder="Describe how your product should move..." 
                class="ai-input w-full rounded-2xl p-4 text-sm resize-none shadow-inner"
            ></textarea>
        </div>

        <button id="generateBtn" class="glow-button w-full py-4 rounded-2xl font-black text-white uppercase tracking-widest text-xs shadow-xl">
            Generate Magic
        </button>

        <div id="statusMessage" class="mt-6 text-[10px] font-bold uppercase tracking-widest min-h-[15px]"></div>
    </div>

    <script>
        // استخدام متغيرات Cloudflare
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagePreview.src = ev.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = async () => {
            const file = fileInput.files[0];
            const prompt = promptInput.value;

            if (!file) {
                statusMessage.innerHTML = '<span class="text-red-500">Please select an image first</span>';
                return;
            }

            generateBtn.disabled = true;
            statusMessage.innerHTML = '<span class="text-blue-400 animate-pulse italic">Syncing with Supabase...</span>';

            try {
                const fileName = `product_${Date.now()}.png`;
                
                // الرفع لـ Storage
                const { error: uploadError } = await supabase.storage
                    .from('product-images')
                    .upload(fileName, file);
                if (uploadError) throw uploadError;

                // الحفظ في الجدول
                const { error: dbError } = await supabase
                    .from('video_requests')
                    .insert([{ image_path: fileName, prompt: prompt, status: 'pending' }]);
                if (dbError) throw dbError;

                statusMessage.innerHTML = '<span class="text-green-500">Success! Data Saved ✅</span>';
            } catch (err) {
                statusMessage.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
