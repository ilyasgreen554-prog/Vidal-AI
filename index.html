<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Pro Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1a1a2e, #050505); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); width: 92%; max-width: 440px; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .template-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; cursor: pointer; }
        .template-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .template-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .upload-wrapper { position: relative; height: 180px; border: 2px dashed rgba(59, 130, 246, 0.3); border-radius: 1.5rem; overflow: hidden; background: rgba(0, 0, 0, 0.3); }
        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
    </style>
</head>
<body class="p-4">

    <div class="glass-card">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">VIDAL-AI</h1>
            <p class="text-gray-500 text-[8px] font-bold uppercase tracking-[0.4em]">Next-Gen Motion Lab</p>
        </header>

        <div class="mb-6">
            <label class="text-[9px] font-black text-purple-400 uppercase tracking-widest mb-3 block">Choose Style Template</label>
            <div class="grid grid-cols-3 gap-2">
                <div class="template-card p-2 rounded-xl text-center" onclick="setTemplate('cinematic', 'Cinematic 4k, slow motion, dynamic lighting, high contrast, car enthusiast style')">
                    <span class="text-xl block mb-1">🎬</span>
                    <span class="text-[8px] font-bold uppercase tracking-tighter">Cinematic</span>
                </div>
                <div class="template-card p-2 rounded-xl text-center" onclick="setTemplate('commercial', 'Commercial product display, 360 rotation, studio lighting, clean white background, 8k')">
                    <span class="text-xl block mb-1">💎</span>
                    <span class="text-[8px] font-bold uppercase tracking-tighter">Premium</span>
                </div>
                <div class="template-card p-2 rounded-xl text-center" onclick="setTemplate('urban', 'Urban streetwear style, glitch effects, neon lights, fast transitions, handheld camera')">
                    <span class="text-xl block mb-1">🏙️</span>
                    <span class="text-[8px] font-bold uppercase tracking-tighter">Urban</span>
                </div>
            </div>
        </div>

        <div class="upload-wrapper mb-6 flex flex-col items-center justify-center">
            <input type="file" id="fileInput" accept="image/*">
            <div id="uploadContent" class="text-center">
                <div class="text-3xl mb-2">📸</div>
                <p class="font-bold text-[10px] text-gray-300 uppercase">Tap to Upload</p>
            </div>
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="mb-6">
            <label class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-2 block">Custom Motion Prompt</label>
            <textarea id="promptInput" rows="2" placeholder="Select a template or write here..." class="input-dark w-full p-3 text-[12px] text-gray-300 resize-none outline-none focus:border-blue-500"></textarea>
        </div>

        <button id="generateBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] shadow-xl hover:opacity-90 transition-all">
            Generate Magic
        </button>

        <div id="statusMsg" class="mt-4 text-center text-[9px] font-black uppercase tracking-widest min-h-[12px]"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('imagePreview');
        const content = document.getElementById('uploadContent');
        const promptInput = document.getElementById('promptInput');
        const statusMsg = document.getElementById('statusMsg');

        // وظيفة اختيار القالب
        function setTemplate(id, promptText) {
            // إزالة الحالة النشطة من الكل
            document.querySelectorAll('.template-card').forEach(card => card.classList.remove('active'));
            // إضافة حالة نشطة للعنصر المختار
            event.currentTarget.classList.add('active');
            // وضع النص في الخانة
            promptInput.value = promptText;
            statusMsg.innerHTML = `<span class="text-purple-400">${id.toUpperCase()} TEMPLATE APPLIED</span>`;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    content.classList.add('opacity-0');
                };
                reader.readAsDataURL(file);
            }
        });

        // (كود الرفع لـ Supabase كما هو في النسخة السابقة)
    </script>
</body>
</html>
