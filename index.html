<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | Pro Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); width: 90%; max-width: 420px; border-radius: 2.5rem; padding: 2rem; }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 100%; border-radius: 1.25rem; padding: 1rem; font-size: 0.875rem; transition: all 0.3s ease; }
        .input-field:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); outline: none; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); width: 100%; padding: 1.25rem; border-radius: 1.25rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-8">
        <h1 class="text-5xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2">Vidal-AI</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em]">Neural Video Engine</p>
    </header>

    <div class="glass-card shadow-2xl">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        
        <div id="dropZone" class="relative overflow-hidden border-2 border-dashed border-gray-800 rounded-[2rem] mb-6 cursor-pointer hover:border-blue-500/50 transition-all aspect-square flex items-center justify-center group">
            <div id="uploadPlaceholder" class="text-center p-6 transition-transform group-hover:scale-110">
                <div class="text-5xl mb-4">📸</div>
                <p class="text-white font-bold text-sm">Upload Product Photo</p>
                <p class="text-gray-500 text-[10px] mt-2">Tap to browse gallery</p>
            </div>
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-[1.9rem]">
        </div>

        <div class="mb-6">
            <label class="block text-blue-400 text-[10px] font-black mb-2 uppercase tracking-widest ml-1">Motion Direction</label>
            <textarea id="promptInput" rows="3" placeholder="Describe the camera movement... (e.g. 360 rotation with cinematic lighting)" class="input-field resize-none shadow-inner"></textarea>
        </div>

        <button id="generateBtn" class="btn-primary shadow-lg text-xs">
            Generate Video
        </button>

        <div id="statusMessage" class="mt-6 text-center text-[10px] font-bold uppercase tracking-widest min-h-[15px]"></div>
    </div>

    <footer class="mt-10 text-gray-700 text-[9px] font-bold tracking-[0.4em]">© 2026 VIDAL-AI</footer>

    <script>
        // إعداد Supabase باستخدام مفاتيحك من Cloudflare
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewImg = document.getElementById('imagePreview');
        const placeholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMessage');

        // إصلاح مشكلة فتح الاستوديو (قائمة الصور)
        dropZone.onclick = () => {
            console.log("Opening Gallery..."); // للتأكد في الكونسول
            fileInput.click();
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('opacity-0');
                    statusMsg.innerHTML = '<span class="text-blue-400">Image Loaded ✅</span>';
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = async () => {
            const file = fileInput.files[0];
            const prompt = promptInput.value;

            if (!file) {
                statusMsg.innerHTML = '<span class="text-red-500">Please select an image</span>';
                return;
            }

            generateBtn.disabled = true;
            statusMsg.innerHTML = '<span class="text-blue-400 animate-pulse italic">Uploading to Cloud...</span>';

            try {
                const fileName = `vidal_${Date.now()}.png`;
                
                // 1. الرفع لـ Supabase Storage
                const { error: upErr } = await supabase.storage.from('product-images').upload(fileName, file);
                if (upErr) throw upErr;

                // 2. الحفظ في الجدول
                const { error: dbErr } = await supabase.from('video_requests').insert([{ image_path: fileName, prompt: prompt, status: 'pending' }]);
                if (dbErr) throw dbErr;

                statusMsg.innerHTML = '<span class="text-green-500">Synced to Database ✅</span>';
            } catch (err) {
                statusMsg.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
