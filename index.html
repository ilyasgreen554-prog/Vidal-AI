<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | المحرك الإبداعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a, #050505);
            color: #ffffff; 
            min-height: 100vh;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .ai-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .ai-input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            outline: none;
        }
        .glow-button {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .glow-button:active { transform: scale(0.98); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-right">

    <div class="text-center mb-8">
        <h1 class="text-5xl font-black mb-3 bg-clip-text text-transparent bg-gradient-to-l from-blue-400 to-purple-400">
            Vidal-AI
        </h1>
        <p class="text-gray-400 text-sm">مستقبلك في صناعة المحتوى يبدأ هنا</p>
    </div>

    <div class="glass-panel p-8 rounded-[2rem] w-full max-w-xl">
        
        <div id="dropZone" class="relative group cursor-pointer mb-6">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div id="previewContainer" class="hidden overflow-hidden rounded-2xl border-2 border-blue-500/30">
                <img id="imagePreview" class="w-full h-48 object-cover">
            </div>
            <div id="uploadPlaceholder" class="border-2 border-dashed border-gray-700 rounded-2xl py-12 text-center group-hover:border-blue-500/50 transition-all">
                <span class="text-4xl block mb-2">✨</span>
                <p class="text-gray-300 font-bold">اضغط لاختيار صورة المنتج</p>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-blue-400 text-xs font-bold mb-2 mr-1 uppercase tracking-wider">وصف الحركة (Prompt)</label>
            <textarea 
                id="promptInput" 
                rows="3" 
                placeholder="مثال: اجعل المنتج يظهر وسط سحب من الدخان مع إضاءة سينمائية متحركة..."
                class="ai-input w-full rounded-xl p-4 text-sm text-gray-200 placeholder:text-gray-600 resize-none"
            ></textarea>
        </div>

        <button id="generateBtn" class="glow-button w-full py-4 rounded-xl font-bold text-white tracking-wide">
            بدء التوليد السحري
        </button>

        <div id="statusMessage" class="mt-4 text-center text-xs font-medium min-h-[1.25rem]"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagePreview.src = ev.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = () => {
            if (!fileInput.files[0]) {
                statusMessage.innerHTML = '<span class="text-red-400">🚨 يرجى اختيار صورة أولاً</span>';
                return;
            }
            statusMessage.innerHTML = '<span class="text-blue-400 animate-pulse italic">جاري تحضير المشهد السينمائي...</span>';
        };
    </script>
</body>
</html>
