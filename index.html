<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | تحويل الصور لفيديو إعلاني</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white font-sans">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Vidal-AI</h1>
        <div class="space-x-4 space-x-reverse">
            <button class="text-slate-300 hover:text-white transition">تسجيل الدخول</button>
            <button class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-full font-medium transition">ابدأ مجاناً</button>
        </div>
    </nav>
    
    <main class="max-w-5xl mx-auto mt-24 text-center px-6">
        <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-4 py-1.5 rounded-full text-sm font-medium">الجيل القادم من إعلانات المنتجات</span>
        <h2 class="text-6xl font-black mt-8 leading-tight">صور منتجاتك ستصبح <br/><span class="text-cyan-400 text-shadow-glow">فيديوهات سينمائية</span></h2>
        <p class="text-slate-400 text-xl mt-6 max-w-2xl mx-auto">ارفع صورة منتجك فقط، واترك للذكاء الاصطناعي مهمة إبهار عملائك بفيديو إعلاني عالي الجودة في ثوانٍ معدودة.</p>
        
        <div class="mt-12 p-12 bg-slate-800/50 rounded-[2rem] border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all cursor-pointer group">
            <div class="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <p class="text-slate-300 text-lg font-medium">اسحب صورة المنتج هنا أو اضغط للرفع</p>
            <p class="text-slate-500 text-sm mt-2">يدعم JPG, PNG (بحد أقصى 5 ميجا)</p>
        </div>
    </main>
</body>
</html>
