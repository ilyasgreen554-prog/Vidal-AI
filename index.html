<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 92%; max-width: 420px; border-radius: 2.5rem; padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* منطقة الرفع الذكية */
        .upload-wrapper {
            position: relative;
            height: 220px;
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 2rem;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }
        /* هذا هو السر: جعل الزر الحقيقي يغطي المنطقة بالكامل وهو شفاف */
        #fileInput {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }
        .premium-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 1.25rem;
            font-weight: 900;
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-container text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            VIDAL-AI
        </h1>
        <p class="text-gray-500 text-[9px] font-bold uppercase tracking-[0.4em] mb-8">AI Video Generation</p>

        <div class="upload-wrapper mb-6 flex flex-col items-center justify-center">
            <input type="file" id="fileInput" accept="image/*">
            
            <div id="uploadContent" class="text-center transition-all duration-300">
                <div class="text-4xl mb-3">🖼️</div>
                <p class="font-bold text-sm text-gray-300">Tap to select photo</p>
                <p class="text-[9px] text-gray-500 mt-1 uppercase tracking-widest font-bold">Studio Access</p>
            </div>
            
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="text-left mb-6">
            <label class="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 block ml-1">Motion Prompt</label>
            <textarea id="promptInput" rows="3" placeholder="Describe movement (e.g. Speed motion)..." class="input-dark w-full p-4 text-sm text-gray-300 resize-none outline-none focus:border-blue-500 transition-all"></textarea>
        </div>

        <button id="generateBtn" class="premium-btn w-full py-5 text-xs uppercase tracking-widest shadow-2xl">
            Create Video
        </button>

        <div id="statusMsg" class="mt-5 text-[10px] font-black uppercase tracking-tighter min-h-[15px]"></div>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('imagePreview');
        const content = document.getElementById('uploadContent');
        const generateBtn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMsg');

        // تحديث المعاينة فور الاختيار
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    content.classList.add('opacity-0');
                    statusMsg.innerHTML = '<span class="text-blue-400 font-bold">Image Selected ✅</span>';
                };
                reader.readAsDataURL(file);
            }
        });

        generateBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) { statusMsg.innerHTML = '<span class="text-red-500">Please select an image first</span>'; return; }

            generateBtn.disabled = true;
            statusMsg.innerHTML = '<span class="text-blue-400 animate-pulse font-black">Syncing to Cloud...</span>';

            try {
                const fileName = `vidal_${Date.now()}.png`;
                await supabase.storage.from('product-images').upload(fileName, file);
                await supabase.from('video_requests').insert([{ 
                    image_path: fileName, 
                    prompt: document.getElementById('promptInput').value 
                }]);
                statusMsg.innerHTML = '<span class="text-green-500 font-black">Success! Data Synced ✅</span>';
            } catch (err) {
                statusMsg.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
