<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #111; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #222; text-align: center; }
        /* جعل زر الرفع كبيراً وواضحاً جداً للمتصفح */
        #fileInput { background: #222; border: 1px solid #444; width: 100%; padding: 15px; border-radius: 10px; margin-bottom: 20px; color: white; cursor: pointer; }
        .preview-img { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 2px solid #3b82f6; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; margin-top: 10px; resize: none; }
        button { background: #3b82f6; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h1 style="color: #3b82f6; font-size: 24px; margin-bottom: 20px;">VIDAL-AI SYSTEM</h1>
        
        <p style="font-size: 12px; color: #666; margin-bottom: 10px; text-align: left;">STEP 1: SELECT IMAGE</p>
        <input type="file" id="fileInput" accept="image/*">
        
        <img id="imagePreview" class="preview-img">

        <p style="font-size: 12px; color: #666; margin-top: 20px; text-align: left;">STEP 2: MOTION PROMPT</p>
        <textarea id="promptInput" rows="3" placeholder="Describe the movement..."></textarea>

        <button id="submitBtn">GENERATE VIDEO</button>
        
        <div id="status" style="margin-top: 15px; font-size: 11px; font-weight: bold; text-transform: uppercase;"></div>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        // تحديث المعاينة عند اختيار الملف
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagePreview.src = ev.target.result;
                    imagePreview.style.display = 'block';
                    status.innerHTML = "IMAGE LOADED ✅";
                    status.style.color = "#4ade80";
                };
                reader.readAsDataURL(file);
            }
        };

        submitBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) {
                status.innerHTML = "❌ SELECT IMAGE FIRST";
                status.style.color = "#ef4444";
                return;
            }

            submitBtn.disabled = true;
            status.innerHTML = "⏳ SYNCING TO SUPABASE...";
            status.style.color = "#3b82f6";

            try {
                const name = `file_${Date.now()}.png`;
                // رفع الصورة
                await supabase.storage.from('product-images').upload(name, file);
                // حفظ البيانات
                await supabase.from('video_requests').insert([{ 
                    image_path: name, 
                    prompt: document.getElementById('promptInput').value 
                }]);
                
                status.innerHTML = "✅ SYNC SUCCESSFUL!";
                status.style.color = "#4ade80";
            } catch (err) {
                status.innerHTML = "❌ ERROR: " + err.message;
                status.style.color = "#ef4444";
            } finally {
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
