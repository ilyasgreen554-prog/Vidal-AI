<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-right">

    <div class="text-center mb-10">
        <h1 class="text-5xl font-bold mb-2 text-blue-500">Vidal-AI</h1>
        <p class="text-gray-400 text-sm">حوّل صور منتجاتك إلى فيديوهات بالذكاء الاصطناعي</p>
    </div>

    <div class="glass p-8 rounded-3xl w-full max-w-lg shadow-2xl">
        <div id="dropZone" class="border-2 border-dashed border-blue-500/50 rounded-2xl p-10 text-center cursor-pointer hover:bg-blue-500/5 transition-all">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            
            <div id="previewContainer" class="hidden mb-4">
                <img id="imagePreview" class="max-h-64 mx-auto rounded-lg shadow-lg">
            </div>
            
            <div id="uploadPlaceholder">
                <div class="text-5xl mb-4">📸</div>
                <p class="text-lg mb-2 font-bold">اضغط هنا لفتح الاستوديو</p>
                <p class="text-xs text-gray-500">يدعم PNG, JPG</p>
            </div>
        </div>

        <button id="generateBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
            إنشاء فيديو احترافي
        </button>

        <div id="statusMessage" class="mt-4 text-center text-xs font-medium"></div>
    </div>

    <script>
        // هذا الجزء هو المسؤول عن فتح الاستوديو بشكل آمن
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const statusMessage = document.getElementById('statusMessage');

        // كود بسيط لضمان فتح القائمة عند الضغط
        dropZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                    statusMessage.innerText = "جاهز لإنشاء الفيديو ✅";
                    statusMessage.style.color = "#4ade80";
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
