<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Pro Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1a1a2e, #050505); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); width: 92%; max-width: 440px; border-radius: 2.5rem; padding: 2rem; }
        .template-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.3s; cursor: pointer; border-radius: 1rem; }
        .template-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .upload-wrapper { position: relative; height: 180px; border: 2px dashed rgba(59, 130, 246, 0.3); border-radius: 1.5rem; background: rgba(0, 0, 0, 0.3); overflow: hidden; }
        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; color: white; outline: none; }
        #authModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">

    <div id="authModal">
        <div class="glass-card text-center">
            <h2 class="text-2xl font-black mb-2">Join Vidal-AI</h2>
            <p class="text-gray-500 text-[10px] uppercase mb-6 tracking-widest">Sign in to start generating</p>
            <input type="email" id="authEmail" placeholder="your@email.com" class="input-dark w-full p-4 mb-4 text-center">
            <button onclick="handleLogin()" id="authBtn" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase text-xs">Send Magic Link</button>
            <p id="authStatus" class="mt-4 text-[9px] text-blue-400 font-bold uppercase"></p>
            <button onclick="closeAuth()" class="mt-4 text-[9px] text-gray-600 underline uppercase">Continue as guest (No Save)</button>
        </div>
    </div>

    <div class="glass-card">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">VIDAL-AI</h1>
            <p class="text-gray-500 text-[8px] font-bold uppercase tracking-[0.4em]">Pro Studio Engine</p>
        </header>

        <div class="mb-6">
            <label class="text-[9px] font-black text-purple-400 uppercase tracking-widest mb-3 block">Style Template</label>
            <div class="grid grid-cols-3 gap-2">
                <div class="template-card p-2 text-center" onclick="applyTemplate(this, 'Cinematic 4k, slow motion, dynamic lighting')">
                    <span class="text-xl block mb-1">🎬</span>
                    <span class="text-[8px] font-bold uppercase">Cinematic</span>
                </div>
                <div class="template-card p-2 text-center" onclick="applyTemplate(this, '360 rotation, studio lighting, white background')">
                    <span class="text-xl block mb-1">💎</span>
                    <span class="text-[8px] font-bold uppercase">Premium</span>
                </div>
                <div class="template-card p-2 text-center" onclick="applyTemplate(this, 'Neon lights, fast motion, urban style')">
                    <span class="text-xl block mb-1">🏙️</span>
                    <span class="text-[8px] font-bold uppercase">Urban</span>
                </div>
            </div>
        </div>

        <div class="upload-wrapper mb-6 flex flex-col items-center justify-center">
            <input type="file" id="fileInput" accept="image/*">
            <div id="uploadPlaceholder" class="text-center">
                <span class="text-2xl">📸</span>
                <p class="text-[10px] font-bold text-gray-500 uppercase mt-2">Tap to Select</p>
            </div>
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="mb-6">
            <textarea id="promptInput" rows="2" placeholder="Describe motion..." class="input-dark w-full p-4 text-[12px] resize-none"></textarea>
        </div>

        <button id="generateBtn" class="w-full py-5 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">
            Generate Magic
        </button>

        <div id="statusMsg" class="mt-6 text-center text-[9px] font-black uppercase tracking-widest min-h-[15px]"></div>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('imagePreview');
        const placeholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const statusMsg = document.getElementById('statusMsg');
        const authModal = document.getElementById('authModal');

        // 1. إصلاح القوالب (تعمل الآن فعلياً)
        function applyTemplate(element, text) {
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            promptInput.value = text;
        }

        // 2. إصلاح المعاينة (تظهر فور اختيار الصورة)
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('opacity-0');
                };
                reader.readAsDataURL(file);
            }
        };

        // 3. إصلاح زر Generate (يفعل كل شيء)
        document.getElementById('generateBtn').onclick = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                authModal.style.display = 'flex';
                return;
            }

            const file = fileInput.files[0];
            if (!file) {
                statusMsg.innerHTML = '<span class="text-red-500">❌ Select Image First</span>';
                return;
            }

            statusMsg.innerHTML = '<span class="text-blue-400 animate-pulse">⏳ Uploading...</span>';
            
            try {
                const fileName = `vidal_${Date.now()}.png`;
                // رفع الصورة فعلياً لـ Storage
                const { error: upErr } = await supabase.storage.from('product-images').upload(fileName, file);
                if (upErr) throw upErr;

                // حفظ البيانات في الجدول
                const { error: dbErr } = await supabase.from('video_requests').insert([{ 
                    image_path: fileName, 
                    prompt: promptInput.value,
                    user_id: user.id
                }]);
                if (dbErr) throw dbErr;

                statusMsg.innerHTML = '<span class="text-green-500">✅ Generated Successfully!</span>';
            } catch (err) {
                statusMsg.innerHTML = `<span class="text-red-500">❌ Error: ${err.message}</span>`;
            }
        };

        function closeAuth() { authModal.style.display = 'none'; }
        
        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const { error } = await supabase.auth.signInWithOtp({ email });
            document.getElementById('authStatus').innerText = error ? "Error!" : "Link Sent! Check Email 📧";
        }
    </script>
</body>
</html>
