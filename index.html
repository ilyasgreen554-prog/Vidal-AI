<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Pro Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1a1a2e, #050505); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); width: 92%; max-width: 440px; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .template-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.3s; cursor: pointer; border-radius: 1.25rem; }
        .template-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .upload-wrapper { position: relative; height: 180px; border: 2px dashed rgba(59, 130, 246, 0.3); border-radius: 1.5rem; background: rgba(0, 0, 0, 0.3); overflow: hidden; }
        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; color: white; outline: none; }
        #authModal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-4">

    <div id="authModal">
        <div class="glass-card text-center relative">
            <button onclick="closeAuth()" class="absolute top-4 right-6 text-gray-500">✕</button>
            <h2 class="text-2xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Vidal-AI Access</h2>
            <p class="text-gray-500 text-[9px] uppercase mb-8 tracking-[0.3em]">Sign in to generate your video</p>
            
            <input type="email" id="authEmail" placeholder="Enter your email" class="input-dark w-full p-4 mb-4 text-center text-sm">
            <button onclick="handleLogin()" id="authBtn" class="w-full py-4 bg-blue-600 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                Send Magic Link
            </button>
            <p id="authStatus" class="mt-6 text-[9px] font-bold text-blue-400 uppercase"></p>
        </div>
    </div>

    <div class="glass-card">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">VIDAL-AI</h1>
            <p class="text-gray-500 text-[8px] font-bold uppercase tracking-[0.4em]">Next-Gen Motion Lab</p>
        </header>

        <div class="mb-6">
            <label class="text-[9px] font-black text-purple-400 uppercase tracking-widest mb-3 block">Choose Style Template</label>
            <div class="grid grid-cols-3 gap-2">
                <div class="template-card p-3 text-center" onclick="applyTemplate(this, 'Cinematic 4k, slow motion, dynamic lighting, high contrast')">
                    <span class="text-2xl block mb-1">🎬</span>
                    <span class="text-[8px] font-bold uppercase">Cinematic</span>
                </div>
                <div class="template-card p-3 text-center" onclick="applyTemplate(this, 'Commercial product display, 360 rotation, studio lighting, 8k')">
                    <span class="text-2xl block mb-1">💎</span>
                    <span class="text-[8px] font-bold uppercase">Premium</span>
                </div>
                <div class="template-card p-3 text-center" onclick="applyTemplate(this, 'Urban street style, neon lights, fast transitions, glitch')">
                    <span class="text-2xl block mb-1">🏙️</span>
                    <span class="text-[8px] font-bold uppercase">Urban</span>
                </div>
            </div>
        </div>

        <div class="upload-wrapper mb-6 flex flex-col items-center justify-center">
            <input type="file" id="fileInput" accept="image/*">
            <div id="uploadPlaceholder" class="text-center transition-opacity duration-300">
                <div class="text-3xl mb-2">📸</div>
                <p class="font-bold text-[9px] text-gray-400 uppercase tracking-widest">Tap to select product</p>
            </div>
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="mb-8">
            <label class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-2 block">Custom Motion Prompt</label>
            <textarea id="promptInput" rows="2" placeholder="Describe the movement..." class="input-dark w-full p-4 text-[12px] resize-none focus:border-blue-500 transition-colors"></textarea>
        </div>

        <button id="generateBtn" class="w-full py-5 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
            Generate Magic
        </button>

        <div id="statusMsg" class="mt-6 text-center text-[9px] font-black uppercase tracking-widest min-h-[15px]"></div>
    </div>

    <script>
        // الربط المباشر بـ Supabase (بناءً على بياناتك)
        const supabaseUrl = 'https://tvwuznswsvdpallwhbac.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2d3V6bnN3c3ZkcGFsbHdoYmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY4OTczMzksImV4cCI6MjA2MjQ3MzMzOX0.eWlI9X_8X_X_X_X_X_X_X_X_X_X_X_X_X_X_X_X_X_X'; // تأكد من نسخ الكود كاملاً من صورتك
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('imagePreview');
        const placeholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const statusMsg = document.getElementById('statusMsg');
        const authModal = document.getElementById('authModal');

        // وظيفة تطبيق القوالب (إصلاح: تعمل الآن)
        window.applyTemplate = function(element, text) {
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            promptInput.value = text;
            statusMsg.innerHTML = '<span class="text-purple-400">Style Template Applied!</span>';
        };

        // إغلاق نافذة الدخول
        window.closeAuth = function() { authModal.style.display = 'none'; };

        // معاينة الصورة فور اختيارها
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('opacity-0');
                    statusMsg.innerHTML = '<span class="text-blue-400">Media Loaded ✅</span>';
                };
                reader.readAsDataURL(file);
            }
        };

        // التعامل مع تسجيل الدخول
        window.handleLogin = async function() {
            const email = document.getElementById('authEmail').value;
            if (!email) return;
            document.getElementById('authBtn').disabled = true;
            document.getElementById('authStatus').innerText = "Sending Link...";
            
            const { error } = await supabase.auth.signInWithOtp({ email });
            if (error) {
                document.getElementById('authStatus').innerText = "Error: " + error.message;
            } else {
                document.getElementById('authStatus').innerText = "Check your email! 📧";
            }
            document.getElementById('authBtn').disabled = false;
        };

        // زر Generate الأساسي
        document.getElementById('generateBtn').onclick = async () => {
            const { data: { user } } = await supabase.auth.getUser();

            if (!user) {
                authModal.style.display = 'flex';
                return;
            }

            if (!fileInput.files[0]) {
                statusMsg.innerHTML = '<span class="text-red-500">Please select an image first</span>';
                return;
            }

            statusMsg.innerHTML = '<span class="text-blue-400 animate-pulse font-black italic">Syncing to Vidal Engine...</span>';
            
            try {
                const file = fileInput.files[0];
                const fileName = `vidal_${Date.now()}.png`;
                
                // الرفع لـ Storage
                const { error: upErr } = await supabase.storage.from('product-images').upload(fileName, file);
                if (upErr) throw upErr;

                // الحفظ في الجدول
                const { error: dbErr } = await supabase.from('video_requests').insert([{ 
                    image_path: fileName, 
                    prompt: promptInput.value,
                    user_id: user.id
                }]);
                if (dbErr) throw dbErr;

                statusMsg.innerHTML = '<span class="text-green-500 font-black">Success! Processing Started ✅</span>';
            } catch (err) {
                statusMsg.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            }
        };
    </script>
</body>
</html>
