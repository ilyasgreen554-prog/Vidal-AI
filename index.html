<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | Professional Video Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-border {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        .gradient-border:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-right">

    <header class="text-center mb-12">
        <div class="inline-block px-4 py-1 mb-4 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold uppercase tracking-widest">
            الجيل القادم من الذكاء الاصطناعي
        </div>
        <h1 class="text-6xl font-extrabold mb-4 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            Vidal-AI
        </h1>
        <p class="text-slate-400 text-lg max-w-md mx-auto">
            حوّل صورك الجامدة إلى تجارب بصرية سينمائية بضغطة زر واحدة.
        </p>
    </header>

    <main class="glass-card p-10 rounded-[2.5rem] w-full max-w-2xl">
        
        <div id="dropZone" class="gradient-border rounded-3xl p-12 text-center cursor-pointer mb-8 relative overflow-hidden group">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            
            <div id="previewContainer" class="hidden relative z-10">
                <img id="imagePreview" class="max-h-72 mx-auto rounded-2xl border-4 border-slate-700 shadow-2xl">
                <p class="mt-4 text-sm text-blue-400 font-semibold">تغيير الصورة</p>
            </div>
            
            <div id="uploadPlaceholder" class="group-hover:scale-105 transition-transform duration-300">
                <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold mb-2">اختر صورة المنتج</h3>
                <p class="text-slate-500 text-sm">اسحب الصورة هنا أو اضغط للتصفح</p>
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-slate-300 text-sm font-semibold mb-3 mr-1">وصف الحركة (Prompt)</label>
            <textarea 
                id="promptInput" 
                rows="3" 
                placeholder="مثال: اجعل السيارة تتحرك بسرعة في شارع ليلي مع انعكاسات أضواء النيون..."
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            ></textarea>
        </div>

        <button id="generateBtn" class="btn-primary w-full py-5 rounded-2xl text-white font-bold text-lg shadow-xl">
            إنشاء فيديو سينمائي
        </button>

        <div id="statusMessage" class="mt-6 text-center text-sm"></div>
    </main>

    <footer class="mt-12 text-slate-500 text-xs">
        &copy; 2026 Vidal-AI Labs. جميع الحقوق محفوظة.
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                    statusMessage.innerHTML = '<span class="text-green-400 font-bold">تم اختيار الصورة بنجاح ✅</span>';
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = () => {
            const prompt = promptInput.value;
            const file = fileInput.files[0];

            if (!file) {
                statusMessage.innerHTML = '<span class="text-red-400">⚠️ يرجى رفع صورة أولاً</span>';
                return;
            }
            
            if (!prompt) {
                statusMessage.innerHTML = '<span class="text-yellow-400 font-bold">💡 نصيحة: كتابة وصف (Prompt) يعطي نتائج أفضل!</span>';
            }

            statusMessage.innerHTML = '<span class="text-blue-400 animate-pulse font-bold">⏳ جاري تحليل الصورة والوصف...</span>';
            
            // سيتم هنا ربط الـ API الفعلي في الخطوة القادمة
        };
    </script>
</body>
</html>
