<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | الجيل القادم من فيديوهات المنتجات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-white font-sans overflow-x-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-blue-500/10 blur-[120px] -z-10"></div>

    <nav class="container mx-auto p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-xl font-black">V</span>
            </div>
            <span class="text-2xl font-bold tracking-tight">Vidal<span class="text-blue-500">-AI</span></span>
        </div>
        <button class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-full border border-white/10 transition-all font-medium">ابدأ الآن</button>
    </nav>

    <main class="container mx-auto px-6 py-24 text-center">
        <div class="inline-flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-4 py-2 rounded-full mb-8">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            <span class="text-sm text-blue-400 font-bold tracking-widest uppercase">مدعوم بالذكاء الاصطناعي</span>
        </div>

        <h2 class="text-5xl md:text-7xl font-black mb-6 leading-[1.1]">حوّل صورة منتجك إلى <br> <span class="bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">فيديو إعلاني مذهل</span></h2>
        
        <p class="text-slate-400 text-xl max-w-2xl mx-auto mb-12">وداعاً لاستوديوهات التصوير المكلفة. ارفع صورة واحدة فقط، وسيتولى Vidal-AI إنشاء فيديو سينمائي لمنتجك في ثوانٍ.</p>

        <div class="max-w-2xl mx-auto p-12 bg-white/5 rounded-[2.5rem] border-2 border-dashed border-white/10 hover:border-blue-500/50 hover:bg-white/[0.07] transition-all cursor-pointer group">
            <div class="mb-6 w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <p class="text-xl font-bold mb-2">اسحب صورة المنتج هنا</p>
            <p class="text-slate-500 text-sm italic">اضغط هنا لاستعراض الملفات من جهازك</p>
        </div>
    </main>
</body>
</html>
