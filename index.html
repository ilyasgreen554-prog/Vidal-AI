<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Professional Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
            color: #fff; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 92%;
            max-width: 430px;
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            height: 240px;
        }
        .upload-area:active { transform: scale(0.97); background: rgba(59, 130, 246, 0.05); }
        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            transition: 0.3s;
        }
        .input-dark:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.03);
            outline: none;
        }
        .premium-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            transition: 0.3s;
        }
        .premium-btn:disabled { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body class="p-4">

    <div class="glass-container text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            VIDAL-AI
        </h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-8">AI Motion Lab</p>

        <input type="file" id="fileInput" accept="image/*" class="hidden">
        
        <div id="dropZone" class="upload-area flex flex-col items-center justify-center cursor-pointer mb-6 group">
            <div id="uploadContent" class="transition-all duration-500">
                <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:scale-110 transition-transform">
                    <span class="text-3xl">✨</span>
                </div>
                <p class="font-bold text-sm text-gray-200">Drop your product here</p>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest font-semibold">Or tap to browse gallery</p>
            </div>
            <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-[1.9rem]">
        </div>

        <div class="text-left mb-6">
            <label class="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 block ml-1">Directional Prompt</label>
            <textarea id="promptInput" rows="3" placeholder="e.g. Cinematic rotation with soft bokeh..." class="input-dark w-full p-4 text-sm text-gray-300 resize-none"></textarea>
        </div>

        <button id="generateBtn" class="premium-btn w-full py-5 text-xs uppercase shadow-2xl">
            Create Masterpiece
        </button>

        <div id="statusMsg" class="mt-6 text-[10px] font-black uppercase tracking-tighter min-h-[15px]"></div>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewImg = document.getElementById('imagePreview');
        const content = document.getElementById('uploadContent');
        const generateBtn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMsg');

        // الربط القوي لفتح الاستوديو في الهواتف
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fileInput.click();
        });

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('hidden');
                    content.classList.add('opacity-0');
                    statusMsg.innerHTML = '<span class="text-blue-400">Media Loaded ✅</span>';
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) { statusMsg.innerHTML = '<span class="text-red-500">Missing Image</span>'; return; }

            generateBtn.disabled = true;
            statusMsg.innerHTML = '<span class="text-blue-400 animate-pulse">Processing Neural Frame...</span>';

            try {
                const fileName = `vidal_${Date.now()}.png`;
                await supabase.storage.from('product-images').upload(fileName, file);
                await supabase.from('video_requests').insert([{ 
                    image_path: fileName, 
                    prompt: document.getElementById('promptInput').value,
                    status: 'processing'
                }]);
                statusMsg.innerHTML = '<span class="text-green-400 font-black">Sync Complete! Check Supabase</span>';
            } catch (err) {
                statusMsg.innerHTML = `<span class="text-red-500">Sync Failed: ${err.message}</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
