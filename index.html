<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidal-AI | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; width: 90%; max-width: 400px; border-radius: 2rem; padding: 2rem; }
        .upload-box { border: 2px dashed #333; border-radius: 1.5rem; transition: 0.3s; height: 250px; display: flex; flex-direction: column; items-center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .upload-box:active { background: #111; transform: scale(0.98); border-color: #3b82f6; }
        .input-text { background: #111; border: 1px solid #222; color: white; border-radius: 1rem; width: 100%; padding: 1rem; margin-top: 0.5rem; }
        .btn { background: linear-gradient(to r, #3b82f6, #8b5cf6); width: 100%; padding: 1.25rem; border-radius: 1rem; font-weight: 900; margin-top: 1.5rem; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4">

    <div class="card shadow-2xl">
        <h1 class="text-3xl font-black text-center mb-6 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 italic">VIDAL-AI</h1>

        <input type="file" id="fileInput" accept="image/*" class="hidden">
        
        <div id="clickZone" class="upload-box text-center mb-6">
            <div id="innerContent">
                <div class="text-5xl mb-3">📸</div>
                <p class="font-bold text-gray-300">Tap to select photo</p>
                <p class="text-[10px] text-gray-600 mt-1 uppercase tracking-widest">Supports JPG, PNG</p>
            </div>
            <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover">
        </div>

        <div class="text-left">
            <label class="text-[10px] font-bold text-blue-500 uppercase ml-1">Motion Prompt</label>
            <textarea id="promptInput" rows="3" placeholder="Describe the movement..." class="input-text resize-none"></textarea>
        </div>

        <button id="submitBtn" class="btn text-sm uppercase tracking-widest">Generate Video</button>
        <div id="msg" class="text-center text-[10px] mt-4 font-bold uppercase tracking-tighter"></div>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = typeof VITE_SUPABASE_URL !== 'undefined' ? VITE_SUPABASE_URL : '';
        const supabaseAnonKey = typeof VITE_SUPABASE_ANON_KEY !== 'undefined' ? VITE_SUPABASE_ANON_KEY : '';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        const fileInput = document.getElementById('fileInput');
        const clickZone = document.getElementById('clickZone');
        const imgPreview = document.getElementById('imgPreview');
        const innerContent = document.getElementById('innerContent');
        const submitBtn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');

        // أهم تعديل: جعل اللمس يفتح القائمة فوراً وبقوة
        clickZone.addEventListener('touchstart', function() { fileInput.click(); }); // للهواتف
        clickZone.addEventListener('click', function() { fileInput.click(); });     // للكمبيوتر

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imgPreview.src = ev.target.result;
                    imgPreview.classList.remove('hidden');
                    innerContent.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        submitBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) { msg.innerHTML = "❌ Select image first"; return; }

            submitBtn.disabled = true;
            msg.innerHTML = "⏳ Syncing...";

            try {
                const name = `prod_${Date.now()}.png`;
                await supabase.storage.from('product-images').upload(name, file);
                await supabase.from('video_requests').insert([{ image_path: name, prompt: document.getElementById('promptInput').value }]);
                msg.innerHTML = "✅ Saved successfully";
            } catch (e) {
                msg.innerHTML = "❌ Error: " + e.message;
            } finally {
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
