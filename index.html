<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidal-AI | Creative Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a, #050505);
            color: #ffffff; 
            min-height: 100vh;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ai-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ai-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        .glow-button {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: transform 0.2s ease;
        }
        .glow-button:hover { transform: translateY(-1px); opacity: 0.9; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-left">

    <div class="text-center mb-10">
        <h1 class="text-6xl font-extrabold mb-3 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            Vidal-AI
        </h1>
        <p class="text-gray-400 text-sm font-medium tracking-wide">THE FUTURE OF PRODUCT STORYTELLING</p>
    </div>

    <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-xl">
        
        <div id="dropZone" class="relative group cursor-pointer mb-8">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div id="previewContainer" class="hidden overflow-hidden rounded-3xl border-2 border-blue-500/40 shadow-2xl">
                <img id="imagePreview" class="w-full h-56 object-cover">
            </div>
            <div id="uploadPlaceholder" class="border-2 border-dashed border-gray-800 rounded-3xl py-16 text-center hover:border-blue-500/50 transition-colors">
                <div class="text-5xl mb-4">🚀</div>
                <p class="text-white font-bold text-lg">Upload Product Image</p>
                <p class="text-gray-500 text-xs mt-2">Support JPG, PNG (Max 5MB)</p>
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-blue-400 text-[10px] font-black mb-3 uppercase tracking-[0.2em] ml-1">Motion Prompt</label>
            <textarea 
                id="promptInput" 
                rows="3" 
                placeholder="Describe how the product should move... (e.g. Cinematic rotation with neon reflections)"
                class="ai-input w-full rounded-2xl p-5 text-sm text-gray-200 placeholder:text-gray-600 resize-none"
            ></textarea>
        </div>

        <button id="generateBtn" class="glow-button w-full py-5 rounded-2xl font-black text-white uppercase tracking-widest text-sm shadow-2xl">
            Generate Magic
        </button>

        <div id="statusMessage" class="mt-6 text-center text-xs font-semibold uppercase tracking-tighter"></div>
    </div>

    <footer class="mt-12 text-gray-600 text-[10px] font-bold tracking-[0.3em]">
        © 2026 VIDAL-AI LABS
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const generateBtn = document.getElementById('generateBtn');
        const statusMessage = document.getElementById('statusMessage');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagePreview.src = ev.target.result;
                    previewContainer.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                    statusMessage.innerHTML = '<span class="text-blue-500">Image Synced Successfully</span>';
                };
                reader.readAsDataURL(file);
            }
        };

        generateBtn.onclick = () => {
            if (!fileInput.files[0]) {
                statusMessage.innerHTML = '<span class="text-red-500">Please select an image</span>';
                return;
            }
            statusMessage.innerHTML = '<span class="text-purple-400 animate-pulse">Initializing Neural Engine...</span>';
        };
    </script>
</body>
</html>
